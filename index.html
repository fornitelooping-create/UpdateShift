<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.db.com/images/public/6a4a32f9c1395028e325c421/96d3d9602_shift.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Shift</title>
    <style>
      #shift-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #1e1f22;
      }
      #shift-splash .shift-logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #shift-splash .shift-logo-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.08);
      }
      #shift-splash .shift-logo-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #5865f2;
        border-right-color: #5865f2;
        animation: shift-spin 0.9s linear infinite;
      }
      #shift-splash img {
        width: 56px;
        height: 56px;
        position: relative;
        z-index: 1;
      }
      #shift-splash p {
        margin: 0;
        color: #b5bac1;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.2px;
      }
      @keyframes shift-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="shift-splash">
        <div class="shift-logo-wrap">
          <img src="/shift-logo.png" alt="Shift" />
        </div>
        <p>Shift est en cours de chargement...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
